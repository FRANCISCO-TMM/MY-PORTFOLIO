    <circle cx="200" cy="190" r="2.5"/><circle cx="260" cy="200" r="2.5"/><circle cx="150" cy="200" r="2.5"/>
    <circle cx="420" cy="120" r="2.5"/><circle cx="460" cy="140" r="2.5"/><circle cx="440" cy="170" r="2.5"/>
    <circle cx="490" cy="110" r="2.5"/><circle cx="510" cy="150" r="2.5"/>
    <circle cx="760" cy="200" r="2.5"/><circle cx="800" cy="180" r="2.5"/><circle cx="830" cy="210" r="2.5"/>
    <circle cx="780" cy="240" r="2.5"/><circle cx="850" cy="250" r="2.5"/>
    <circle cx="1080" cy="150" r="2.5"/><circle cx="1120" cy="130" r="2.5"/><circle cx="1150" cy="160" r="2.5"/>
    <circle cx="1100" cy="190" r="2.5"/><circle cx="1180" cy="200" r="2.5"/>
    <circle cx="1380" cy="220" r="2.5"/><circle cx="1420" cy="200" r="2.5"/><circle cx="1400" cy="250" r="2.5"/>
    <circle cx="300" cy="420" r="2.5"/><circle cx="340" cy="450" r="2.5"/><circle cx="320" cy="480" r="2.5"/>
    <circle cx="900" cy="440" r="2.5"/><circle cx="940" cy="460" r="2.5"/><circle cx="920" cy="500" r="2.5"/>
    <circle cx="1250" cy="420" r="2.5"/><circle cx="1290" cy="450" r="2.5"/><circle cx="1270" cy="490" r="2.5"/>
  </g>

  <!-- Connection arcs between major nodes -->
  <g fill="none" stroke="#D4AF37" stroke-width="1" opacity="0.3">
    <path d="M 210 160 Q 500 40 800 190"/>
    <path d="M 800 190 Q 950 60 1120 145"/>
    <path d="M 1120 145 Q 1250 130 1400 220"/>
    <path d="M 210 160 Q 260 320 320 450"/>
    <path d="M 800 190 Q 860 320 920 460"/>
    <path d="M 1120 145 Q 1200 280 1270 450"/>
    <path d="M 320 450 Q 600 560 920 460"/>
    <path d="M 920 460 Q 1100 540 1270 450"/>
  </g>

  <!-- Glowing hub nodes -->
  <g>
    <circle cx="210" cy="160" r="18" fill="url(#nodeGlow)"/>
    <circle cx="800" cy="190" r="22" fill="url(#nodeGlow)"/>
    <circle cx="1120" cy="145" r="16" fill="url(#nodeGlow)"/>
    <circle cx="920" cy="460" r="16" fill="url(#nodeGlow)"/>
    <circle cx="210" cy="160" r="3.5" fill="#F1D27A"/>
    <circle cx="800" cy="190" r="4" fill="#F1D27A"/>
    <circle cx="1120" cy="145" r="3.5" fill="#F1D27A"/>
    <circle cx="920" cy="460" r="3.5" fill="#F1D27A"/>
  </g>

  <!-- Faint hexagon grid texture, lower third -->
  <g fill="none" stroke="#22A6A0" stroke-width="0.8" opacity="0.12">
    <polygon points="100,600 130,585 160,600 160,630 130,645 100,630"/>
    <polygon points="160,600 190,585 220,600 220,630 190,645 160,630"/>
    <polygon points="220,600 250,585 280,600 280,630 250,645 220,630"/>
    <polygon points="700,620 730,605 760,620 760,650 730,665 700,650"/>
    <polygon points="760,620 790,605 820,620 820,650 790,665 760,650"/>
    <polygon points="1300,600 1330,585 1360,600 1360,630 1330,645 1300,630"/>
    <polygon points="1360,600 1390,585 1420,600 1420,630 1390,645 1360,630"/>
  </g>
</svg>
